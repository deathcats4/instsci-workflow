name: Windows CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-build-audit:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    timeout-minutes: 30
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and release tools
        run: python -m pip install --upgrade pip build twine .

      - name: Run unit and regression tests
        run: python -B -m unittest discover -s instsci/tests -v

      - name: Remove installer build tree before source audit
        run: |
          $workspace = [IO.Path]::GetFullPath((Get-Location).Path).TrimEnd('\')
          $buildDir = [IO.Path]::GetFullPath((Join-Path $workspace 'build'))
          if (-not $buildDir.StartsWith($workspace + '\', [StringComparison]::OrdinalIgnoreCase)) {
            throw "Refusing to remove a build directory outside the workspace: $buildDir"
          }
          if (Test-Path -LiteralPath $buildDir) {
            Remove-Item -LiteralPath $buildDir -Recurse -Force
          }

      - name: Audit public repository
        run: python -B -m instsci.cli public-audit .

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Reject bundled tests in wheel
        shell: python
        run: |
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              bundled_tests = [name for name in archive.namelist() if name.startswith("instsci/tests/")]
          if bundled_tests:
              raise SystemExit(f"wheel contains test files: {bundled_tests[:5]}")
